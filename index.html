<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e11;
      --surface: #1a1820;
      --border: #2e2b38;
      --accent: #c9f261;
      --accent2: #7c6af7;
      --text: #e8e4f0;
      --muted: #7a7585;
      --danger: #f26161;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      max-width: 700px;
      margin: 0 auto 40px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
    }

    .container { max-width: 700px; margin: 0 auto; }

    /* ── Form ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .form-card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      font-family: 'DM Mono', monospace;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { border-color: var(--accent2); }
    textarea { resize: vertical; min-height: 100px; }

    input::placeholder, textarea::placeholder { color: var(--muted); }

    button.save-btn {
      background: var(--accent);
      color: #0f0e11;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 28px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button.save-btn:hover { opacity: 0.85; }
    button.save-btn:active { transform: scale(0.97); }
    button.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status message ── */
    #status {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 18px;
    }
    #status.success { color: var(--accent); }
    #status.error { color: var(--danger); }

    /* ── Notes list ── */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .notes-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'DM Mono', monospace;
    }

    #note-count {
      background: var(--accent2);
      color: #fff;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 2px 10px;
    }

    #notes-list { display: flex; flex-direction: column; gap: 12px; }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .note-body { flex: 1; }

    .note-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .note-content {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .note-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--border);
      margin-top: 10px;
    }

    .delete-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 6px 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .delete-btn:hover { border-color: var(--danger); color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>my<span>Notes</span></h1>
    <p>// fullstack app</p>
  </header>

  <div class="container">

    <!-- ── FORM ── -->
    <div class="form-card">
      <h2>// new note</h2>
      <input type="text" id="title" placeholder="Note title..." />
      <textarea id="content" placeholder="Write your note here..."></textarea>
      <button class="save-btn" onclick="saveNote()">Save Note</button>
      <div id="status"></div>
    </div>

    <!-- ── NOTES LIST ── -->
    <div class="notes-header">
      <h2>// saved notes</h2>
      <span id="note-count">0 notes</span>
    </div>
    <div id="notes-list"><div class="loading">loading notes...</div></div>

  </div>

  <script>
    // ─────────────────────────────────────────────
    // This is your frontend JavaScript
    // It talks to YOUR backend (Express server)
    // using the Fetch API
    // ─────────────────────────────────────────────

    const API = ''; // empty = same server, so /api/notes works

    // Load all notes when the page opens
    async function loadNotes() {
      const list = document.getElementById('notes-list');

      try {
        const res = await fetch(`${API}/api/notes`);   // GET request to backend
        const notes = await res.json();

        document.getElementById('note-count').textContent =
          `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

        if (notes.length === 0) {
          list.innerHTML = '<div class="empty-state">no notes yet — write your first one! ✍️</div>';
          return;
        }

        list.innerHTML = notes.map(note => `
          <div class="note-card" id="note-${note.id}">
            <div class="note-body">
              <div class="note-title">${escapeHtml(note.title)}</div>
              <div class="note-content">${escapeHtml(note.content)}</div>
              <div class="note-date">${new Date(note.created_at).toLocaleString()}</div>
            </div>
            <button class="delete-btn" onclick="deleteNote('${note.id}')">delete</button>
          </div>
        `).join('');

      } catch (err) {
        list.innerHTML = '<div class="empty-state">❌ Could not connect to server</div>';
      }
    }

    // Save a new note
    async function saveNote() {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const status = document.getElementById('status');
      const btn = document.querySelector('.save-btn');

      if (!title || !content) {
        showStatus('Please fill in both fields!', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const res = await fetch(`${API}/api/notes`, {   // POST request to backend
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content })       // sending data as JSON
        });

        if (!res.ok) throw new Error('Failed to save');

        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        showStatus('✓ Note saved!', 'success');
        loadNotes(); // refresh the list

      } catch (err) {
        showStatus('❌ Error saving note', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save Note';
      }
    }

    // Delete a note
    async function deleteNote(id) {
      if (!confirm('Delete this note?')) return;

      try {
        await fetch(`${API}/api/notes/${id}`, { method: 'DELETE' }); // DELETE request
        loadNotes();
      } catch (err) {
        alert('Error deleting note');
      }
    }

    // Helper: show status message
    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
      setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000);
    }

    // Helper: prevent XSS (always escape user content!)
    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Load notes on page start
    loadNotes();
  </script>

</body>
</html>
